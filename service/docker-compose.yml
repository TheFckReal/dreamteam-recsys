services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5444:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  s3:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    networks:
      - internal
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      DEFAULT_BUCKET_NAME: ${DEFAULT_BUCKET_NAME:?DEFAULT_BUCKET_NAME is required}
    networks:
      - internal
    depends_on:
      s3:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://s3:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${DEFAULT_BUCKET_NAME}"
    restart: on-failure

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.12.0
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      DEFAULT_BUCKET_NAME: ${DEFAULT_BUCKET_NAME:?DEFAULT_BUCKET_NAME is required}
      "MLFLOW_S3_ENDPOINT_URL": "http://s3:9000"
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      # AWS_DEFAULT_REGION: ru-central1
    command:
      - bash
      - -c
      - |
        pip install boto3 psycopg2-binary --quiet
        mlflow server --host 0.0.0.0 --port 5000 \
            --backend-store-uri postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB} \
            --default-artifact-root s3://$${DEFAULT_BUCKET_NAME}/mlflow \
            --artifacts-destination s3://$${DEFAULT_BUCKET_NAME}/mlflow \
            --serve-artifacts
    expose:
      - "5000"
    ports:
      - "5050:5000"
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
    volumes:
      # - mlflow-data:/mlflow
      - mlflow-data:/mlflow

networks:
  internal:
    driver: bridge

volumes:
  minio-data:
    driver: local
  postgres-data:
    driver: local
  mlflow-data:
    driver: local